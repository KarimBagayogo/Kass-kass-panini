<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KASS-KASS PANINI</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

/* RESET */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Poppins', sans-serif;
    background: #0f0f0f;
    color: white;
}

/* LOADER */
#loader {
    position: fixed;
    width: 100%;
    height: 100%;
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 999;
}

.loader-circle {
    width: 50px;
    height: 50px;
    border: 5px solid #333;
    border-top: 5px solid #ffcc00;
    border-radius: 50%;
    animation: spin 1s linear infinite;
}

@keyframes spin {
    100% { transform: rotate(360deg); }
}

/* HEADER */
header {
    padding: 20px;
    text-align: center;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid rgba(255,255,255,0.1);
}

header h1 {
    font-size: 22px;
}

header p {
    font-size: 13px;
    color: #aaa;
}

/* MENU */
.menu {
    padding: 15px;
}

/* CARD */
.item {
    display: flex;
    align-items: center;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    border-radius: 15px;
    padding: 10px;
    margin-bottom: 12px;
    transition: 0.3s;
}

.item:hover {
    transform: scale(1.02);
}

/* IMAGE */
.item img {
    width: 70px;
    height: 70px;
    border-radius: 10px;
    object-fit: cover;
    margin-right: 10px;
}

/* INFO */
.item-info {
    flex: 1;
}

.item-info h3 {
    font-size: 14px;
}

.item-info p {
    font-size: 12px;
    color: #ccc;
}

/* BUTTON */
button {
    background: #ffcc00;
    border: none;
    padding: 6px 10px;
    border-radius: 8px;
    font-weight: bold;
    cursor: pointer;
}

/* BADGE */
.badge {
    position: fixed;
    top: 15px;
    right: 15px;
    background: #ffcc00;
    color: black;
    font-weight: bold;
    border-radius: 50%;
    padding: 8px 12px;
}

/* CART */
.cart {
    position: fixed;
    bottom: 0;
    width: 100%;
    background: rgba(0,0,0,0.9);
    backdrop-filter: blur(10px);
    padding: 15px;
    border-top-left-radius: 20px;
    border-top-right-radius: 20px;
}

.cart button {
    width: 100%;
    margin-top: 10px;
    padding: 10px;
}

/* ANIMATION AJOUT */
.added {
    animation: pop 0.3s ease;
}

@keyframes pop {
    50% { transform: scale(1.2); }
}

</style>
</head>

<body>

<!-- LOADER -->
<div id="loader">
    <div class="loader-circle"></div>
</div>

<!-- BADGE -->
<div class="badge" id="badge">0</div>

<header>
    <h1>KASS-KASS PANINI</h1>
    <p>Le panini qui réveille 🔥</p>
</header>

<section class="menu">

    <!-- PANINI POULET -->
    <div class="item">
        <img src="https://images.unsplash.com/photo-1550547660-d9450f859349">
        <div class="item-info">
            <h3>Panini Poulet</h3>
            <p>2000F</p>
        </div>
        <button onclick="addToCart('Panini Poulet',2000,this)">+</button>
    </div>

    <!-- PANINI VIANDE -->
    <div class="item">
        <img src="https://images.unsplash.com/photo-1606755962773-d324e0a13086">
        <div class="item-info">
            <h3>Panini Viande</h3>
            <p>1500F</p>
        </div>
        <button onclick="addToCart('Panini Viande',1500,this)">+</button>
    </div>

    <!-- SANDWICH -->
    <div class="item">
        <img src="https://images.unsplash.com/photo-1553909489-cd47e0907980">
        <div class="item-info">
            <h3>Sandwich</h3>
            <p>1500F</p>
        </div>
        <button onclick="addToCart('Sandwich',1500,this)">+</button>
    </div>

    <!-- OMELETTE -->
    <div class="item">
        <img src="https://images.unsplash.com/photo-1551183053-bf91a1d81141">
        <div class="item-info">
            <h3>Omelette</h3>
            <p>+500F (supplément)</p>
        </div>
        <button onclick="addToCart('Omelette',500,this)">+</button>
    </div>

    <!-- BOISSON -->
    <div class="item">
        <img src="https://images.unsplash.com/photo-1544145945-f90425340c7e">
        <div class="item-info">
            <h3>Boisson</h3>
            <p>500F</p>
        </div>
        <button onclick="addToCart('Boisson',500,this)">+</button>
    </div>

</section>

<section class="cart">
    <p>Total : <span id="total">0</span> F</p>
    <button onclick="sendWhatsApp()">Commander via WhatsApp</button>
</section>

<script>

let cart = [];
let total = 0;
let count = 0;

/* LOADER */
window.onload = () => {
    setTimeout(() => {
        document.getElementById("loader").style.display = "none";
    }, 1000);
};

/* ADD TO CART */
function addToCart(name, price, btn) {
    cart.push({name, price});
    total += price;
    count++;

    document.getElementById("total").textContent = total;
    document.getElementById("badge").textContent = count;

    btn.classList.add("added");
    setTimeout(() => btn.classList.remove("added"), 300);
}

/* WHATSAPP */
function sendWhatsApp() {
    let message = "Commande Kass-Kass Panini:%0A";

    cart.forEach(item => {
        message += "- " + item.name + "%0A";
    });

    message += "Total: " + total + "F";

    let phone = "22375111212";
    let url = `https://wa.me/${phone}?text=${message}`;

    window.open(url, "_blank");
}

</script>

</body>
</html>
